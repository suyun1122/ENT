[phases.setup]
nixPkgs = ["python3", "gcc", "libGL", "glib", "xorg.libxcb", "xorg.libX11"]
aptPkgs = ["libgl1", "libglib2.0-0", "libxcb1", "libx11-6", "libxcb-xinerama0", "libxcb-icccm4", "libxcb-image0", "libxcb-keysyms1", "libxcb-randr0", "libxcb-render-util0", "libxcb-shape0"]

[phases.build]
cmds = [
    "echo '/usr/lib/x86_64-linux-gnu' | sudo tee /etc/ld.so.conf.d/opencv.conf",
    "sudo ldconfig",
    "ldconfig -p | grep libxcb || true"
]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && pip uninstall -y opencv-python || true",
    ". /opt/venv/bin/activate && pip install --force-reinstall opencv-python-headless"
]

[start]
cmd = "sh -c 'export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH && exec /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT'"
