[phases.setup]
nixPkgs = ["python3", "gcc", "libGL", "glib", "xorg.libxcb", "xorg.libX11"]
aptPkgs = ["libgl1", "libglib2.0-0", "libxcb1", "libx11-6"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && pip uninstall -y opencv-python || true",
    ". /opt/venv/bin/activate && pip install --force-reinstall opencv-python-headless"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
